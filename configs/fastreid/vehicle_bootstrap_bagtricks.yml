_BASE_: ../../external/fastreid/configs/Base-bagtricks.yml

MODEL:
  DEVICE: cuda:0
  BACKBONE:
    DEPTH: 18x
    FEAT_DIM: 512
    PRETRAIN: True
  HEADS:
    NUM_CLASSES: 0

DATASETS:
  NAMES: ("VeRi",)
  TESTS: ("VeRi",)

DATALOADER:
  SAMPLER_TRAIN: NaiveIdentitySampler
  NUM_INSTANCE: 4
  NUM_WORKERS: 0

SOLVER:
  AMP:
    ENABLED: False
  BASE_LR: 0.00035
  IMS_PER_BATCH: 32
  MAX_EPOCH: 10
  WARMUP_ITERS: 0
  FREEZE_ITERS: 0
  CHECKPOINT_PERIOD: 1

TEST:
  EVAL_PERIOD: 1
  IMS_PER_BATCH: 128
  PRECISE_BN:
    ENABLED: False
  AQE:
    ENABLED: False
  RERANK:
    ENABLED: False
  ROC:
    ENABLED: False

OUTPUT_DIR: weights/fastreid_bootstrap
